---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install pip module
      ansible.builtin.pip:
        name: docker
        state: present
      when:
        - ansible_facts['distribution_release'] not in [ "bookworm", "noble" ]
        - ansible_facts['os_family'] != "Alpine"

    - name: Check if bootstrap still works.
      ansible.builtin.include_role:
        name: buluma.bootstrap

    - name: Remove pip module
      ansible.builtin.pip:
        name: docker
        state: absent
      when:
        - ansible_facts['distribution_release'] not in [ "bookworm", "noble" ]
        - ansible_facts['os_family'] != "Alpine"
